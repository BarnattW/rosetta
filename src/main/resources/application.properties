spring.application.name=rosetta

# Postgres configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/rosetta
spring.datasource.username=rosetta
spring.datasource.password=rosetta
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway configuration
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis configuration
spring.redis.host=localhost
spring.redis.port=6379

# JWT configuration
jwt.secret=thisismysecretkeythisismysecretkeythisismysecretkey
jwt.expiration=3600000
jwt.refreshExpiration=86400000

# S3/MinIO configuration
storage.endpoint=http://localhost:9000
storage.accessKey=minioadmin
storage.secretKey=minioadmin
storage.bucket=rosetta-videos
# dummy region for minio, not used but required by AWS SDK
storage.region=us-east-1

# Kafka configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=rosetta-consumers
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# OpenAI configuration
openai.api-key=placeholder
