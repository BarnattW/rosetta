spring.application.name=rosetta

# Postgres configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/rosetta
spring.datasource.username=rosetta
spring.datasource.password=rosetta
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway configuration
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis configuration
spring.redis.host=localhost
spring.redis.port=6379

# JWT configuration
jwt.secret=thisismysecretkeythisismysecretkeythisismysecretkey
jwt.expiration=3600000
jwt.refreshExpiration=86400000